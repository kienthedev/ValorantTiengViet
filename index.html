<body class="bg-dark text-white">
  <!-- Navbar -->
  <div id="navbar"></div>

  <main>
    <!-- Banner -->
    <section id="hero-banner" class="hero-banner">
      <div class="container">
        <div class="hero-wrapper">
          <div id="hero-carousel" class="hero-carousel"></div>
          <div class="hero-nav">
            <button id="hero-prev">❮</button>
            <button id="hero-next">❯</button>
          </div>
        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <div class="schedule-section">
      <div class="container">
        <h2 class="section-title">SCHEDULE</h2>

        <div class="schedule-tabs">
          <button class="schedule-tab active" onclick="setScheduleTab(this, 'today')">

          </button>

          <button class="schedule-tab" onclick="setScheduleTab(this, 'tomorrow')">
            Ngày mai
          </button>
        </div>

        <div id="matches-container"></div>
      </div>
    </div>

    <div class="section-divider"></div>

    <!-- Caster -->
    <section class="casters-section">
      <div class="container">
        <h2 class="section-title">CASTERS</h2>

        <div id="casters-container" class="casters-grid"></div>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- Sponsor -->
    <section class="sponsor-section">
      <div class="container sponsor-container">
        <h2 class="section-title">PARTNERS & CLIENTS</h2>

        <div class="sponsor-grid">
          <div class="sponsor-item">
            <img src="assets/sponsors/tg_image_527335784.png" loading="lazy" alt="Sponsor" />

          </div>

          <div class="sponsor-item">
            <img src="assets/sponsors/images.png" loading="lazy" alt="Sponsor" />
          </div>
        </div>
      </div>
