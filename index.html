<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />

    <title>Valorant VN</title>
  </head>

  <body class="bg-dark text-white">
    <!-- Navbar -->
    <div id="navbar"></div>

    <!-- Banner -->
    <section id="hero-banner" class="hero-banner">
      <div class="hero-wrapper">
        <div id="hero-carousel"></div>
        <div class="hero-nav">
          <button id="hero-prev">❮</button>
          <button id="hero-next">❯</button>
        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- Caster -->
    <section class="casters-section">
      <div class="container">
        <h2 class="section-title">Casters</h2>

        <div id="casters-container" class="casters-grid"></div>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- Sponsor -->
    <section class="sponsor-section">
      <div class="sponsor-container">
        <h2 class="section-title">Đối tác & Khách hàng</h2>

        <div class="sponsor-grid">
          <div class="sponsor-item">
            <img src="assets/sponsors/tg_image_527335784.png" />
          </div>

          <div class="sponsor-item">
            <img
              src="https://a.storyblok.com/f/235924/1920x700/27b2120b20/group-172_2.png/m/filters:quality(80)"
            />
          </div>

          <div class="sponsor-item">
            <img
              src="https://yt3.googleusercontent.com/De8_JR9nnlT7nefLMElF-m-EpJEyvpLA46BsX0BkVlQfMdt2yHyhWiSmx-Pd1c-u_08cZAoV=s900-c-k-c0x00ffffff-no-rj"
            />
          </div>

          <div class="sponsor-item">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS4S4aPcJ5DkoBVUfQtNJPI0QpFTh-ypJsrjhFu69nCNl_CvhweLz2L1TxqhZNKfYQb-1w&usqp=CAU"
            />
          </div>
        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <!-- Footer -->
    <div id="footer"></div>

    <script src="js/script.js"></script>
  </body>
</html>
